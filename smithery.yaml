name: html-parser-ai-mcp
description: Html Parser Ai automation via MCP. Includes extract links, extract text,
  validate html. By MEOK AI Labs.
version: 1.0.0
tools:
- name: extract_links
  description: Extract all links (anchor tags) from HTML content.
  parameters:
  - name: html
    type: string
    required: true
  - name: base_url
    type: string
    required: false
- name: extract_text
  description: Extract plain text content from HTML, stripping all tags.
  parameters:
  - name: html
    type: string
    required: true
  - name: preserve_newlines
    type: boolean
    required: false
- name: validate_html
  description: Validate HTML for common issues (unclosed tags, missing attributes,
    etc.).
  parameters:
  - name: html
    type: string
    required: true
- name: find_meta_tags
  description: Extract all meta tags and their attributes from HTML.
  parameters:
  - name: html
    type: string
    required: true
